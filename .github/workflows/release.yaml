name: Release

on:
  push:
    tags:
      - 'ofetch-presets\@[0-9]+\.[0-9]+\.[0-9]+*'
      - 'ofetch-preset-*\@[0-9]+\.[0-9]+\.[0-9]+*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: aa900031/github-actions/setup-node@main
        with:
          no-turbo-cache: 'true'

      - name: Build dist
        run: node --run build

      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
